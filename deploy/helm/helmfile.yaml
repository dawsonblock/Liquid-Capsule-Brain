repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: bitnami-labs
    url: https://bitnami-labs.github.io/sealed-secrets

releases:
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: 1.14.4
    values:
      - installCRDs: true

  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.11.2
    values: []

  - name: sealed-secrets
    namespace: sealed-secrets
    chart: bitnami-labs/sealed-secrets
    version: 2.15.3
    values: []

  - name: cb
    namespace: capsule-brain
    chart: ./capsule-brain
    values:
      - ./capsule-brain/values.yaml


  - name: argo-cd
    namespace: argocd
    chart: argo/argo-cd
    version: 6.7.12
    values: []
    # repo added below
