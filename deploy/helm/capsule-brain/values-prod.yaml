# Production overrides
replicaCount: 4

image:
  repository: capsule-brain
  tag: "1.0.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: cb.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: cb-tls

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1500m"
    memory: "1Gi"

env:
  CB_API_HOST: "0.0.0.0"
  CB_API_PORT: "8000"
  ALLOW_ORIGINS: "https://cb.example.com"

metrics:
  serviceMonitor:
    create: true
    scrapeInterval: 15s
    labels:
      release: prometheus-stack

autoscaling:
  enabled: true
  minReplicas: 4
  maxReplicas: 12
  targetCPUUtilizationPercentage: 75
