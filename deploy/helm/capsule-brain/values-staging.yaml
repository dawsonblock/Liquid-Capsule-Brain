# Staging overrides
replicaCount: 2

image:
  repository: capsule-brain
  tag: "1.0.1-rc"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: cb-staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: cb-staging-tls

resources:
  requests:
    cpu: "250m"
    memory: "384Mi"
  limits:
    cpu: "1000m"
    memory: "768Mi"

env:
  CB_API_HOST: "0.0.0.0"
  CB_API_PORT: "8000"
  ALLOW_ORIGINS: "https://cb-staging.example.com"

metrics:
  serviceMonitor:
    create: true
    scrapeInterval: 30s
    labels:
      release: prometheus-stack

autoscaling:
  enabled: false
