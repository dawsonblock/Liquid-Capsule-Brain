replicaCount: 2

image:
  repository: capsule-brain
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: cb.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: cb-tls

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

env: {}
  # CB_API_HOST: "0.0.0.0"
  # CB_API_PORT: "8000"
  # ALLOW_ORIGINS: "https://cb.example.com"

envFrom:
  configMapName: ""
  secretName: ""

metrics:
  serviceMonitor:
    create: true
    scrapeInterval: 15s
    labels: {}

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}


secrets:
  enabled: false
  stringData: {}
sealedSecrets:
  enabled: false
  encryptedData: {}
