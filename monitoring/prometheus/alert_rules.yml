groups:
  - name: capsule-brain-alerts
    rules:
      # High response time alert
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s for the last 5 minutes"

      # High error rate alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"

      # Memory usage alert
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024 / 1024) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}GB"

      # CPU usage alert
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"

      # Service down alert
      - alert: ServiceDown
        expr: up{job="capsule-brain"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Capsule Brain service is down"
          description: "The Capsule Brain service has been down for more than 1 minute"

      # Debug operations alert
      - alert: HighDebugOperations
        expr: rate(debug_operations_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High debug operations rate"
          description: "Debug operations rate is {{ $value }} per second"

      # Memory leak detection
      - alert: PotentialMemoryLeak
        expr: increase(memory_objects_count[1h]) > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Potential memory leak detected"
          description: "Object count increased by {{ $value }} in the last hour"

      # Disk space alert
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is less than 10% available"

      # High connection count
      - alert: HighConnectionCount
        expr: http_connections_active > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High connection count"
          description: "Active connections: {{ $value }}"
