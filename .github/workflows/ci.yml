name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 2 * * 0"  # Weekly security scan

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  PYTHON_VERSION_MATRIX: "3.11,3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Black format check
        run: black --check --diff .
      - name: isort check
        run: isort --check-only --diff .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Bandit security scan
        run: bandit -r capsule_brain/ -f json -o bandit-report.json
      - name: Safety dependency check
        run: safety check --json --output safety-report.json
      - name: pip-audit security check
        run: pip-audit --format=json --output=pip-audit-report.json
      - name: Upload security reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            pip-audit-report.json

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: MyPy type check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: mypy . --junit-xml=mypy-report.xml
      - name: Upload type check report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mypy-report
          path: mypy-report.xml

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest --cov=capsule_brain --cov-report=xml --cov-report=html --junitxml=pytest-report.xml
      - name: Upload coverage reports
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
            pytest-report.xml

  performance:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements.txt
      - name: Run performance tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_performance.py -v --benchmark-only
      - name: Upload performance results
        uses: actions/upload-artifact@v5
        with:
          name: performance-results
          path: .benchmarks/

  build-and-scan:
    runs-on: ubuntu-latest
    needs: [test, type-check]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t capsule-brain:ci .
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
          hide-progress: true
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: capsule-brain:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
          hide-progress: true
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/capsule-brain:ci-${{ github.sha }}
          docker tag capsule-brain:ci $IMAGE
          docker push $IMAGE

  compose-smoke:
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: |
          echo "ADMIN_TOKEN=ci-smoke-token" >> .env
          echo "APP_ENV=production" >> .env
      - name: Compose up
        run: docker compose -f config/docker/docker-compose.yml -f config/docker/docker-compose.override.yml up --build --wait --wait-timeout 180
      - name: Smoke test API
        run: |
          curl -fsS -H "x-admin-token: ci-smoke-token" http://localhost:8000/healthz
          curl -fsS -H "x-admin-token: ci-smoke-token" http://localhost:8000/ready
          curl -fsS http://localhost:8000/metrics | grep http_request_duration_seconds
      - name: Compose down
        if: always()
        run: docker compose -f config/docker/docker-compose.yml -f config/docker/docker-compose.override.yml down -v
