name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: MyPy
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: mypy .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements.txt
      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

  build-and-scan:
    runs-on: ubuntu-latest
    needs: [test, type-check]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t capsule-brain:ci .
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
          hide-progress: true
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: image
          image-ref: capsule-brain:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
          hide-progress: true
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/capsule-brain:ci-${{ github.sha }}
          docker tag capsule-brain:ci $IMAGE
          docker push $IMAGE

  compose-smoke:
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - uses: actions/checkout@v5
      - name: Prepare environment
        run: |
          echo "ADMIN_TOKEN=ci-smoke-token" >> .env
          echo "APP_ENV=production" >> .env
      - name: Compose up
        run: docker compose -f config/docker/docker-compose.yml -f config/docker/docker-compose.override.yml up --build --wait --wait-timeout 180
      - name: Smoke test API
        run: |
          curl -fsS -H "x-admin-token: ci-smoke-token" http://localhost:8000/healthz
          curl -fsS -H "x-admin-token: ci-smoke-token" http://localhost:8000/ready
          curl -fsS http://localhost:8000/metrics | grep http_request_duration_seconds
      - name: Compose down
        if: always()
        run: docker compose -f config/docker/docker-compose.yml -f config/docker/docker-compose.override.yml down -v
