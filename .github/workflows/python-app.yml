name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install uvicorn
      - name: Lint
        run: |
          ruff check .
          black --check .
          isort -c .
      - name: Typecheck
        run: mypy .
      - name: Tests
        run: pytest -q
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Smoke (API up)
        run: |
          python launch_capsule_brain.py &
          for i in {1..20}; do curl -fsS http://127.0.0.1:8000/healthz && break || sleep 0.5; done
          CB_BASE_URL=http://127.0.0.1:8000 python scripts/smoke_run.py
        env:
          PYTHONPATH: ${{ github.workspace }}
