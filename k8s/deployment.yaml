apiVersion: apps/v1
kind: Deployment
metadata:
  name: capsule-brain
spec:
  replicas: 2
  selector:
    matchLabels: { app: capsule-brain }
  template:
    metadata:
      labels: { app: capsule-brain }
    spec:
      containers:
        - name: api
          image: capsule-brain:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CB_API_HOST
              value: "0.0.0.0"
            - name: CB_API_PORT
              value: "8000"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: capsule-brain
spec:
  selector: { app: capsule-brain }
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
