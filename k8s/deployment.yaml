apiVersion: apps/v1
kind: Deployment
metadata:
  name: capsule-brain
spec:
  replicas: 2
  selector:
    matchLabels: { app: capsule-brain }
  template:
    metadata:
      labels: { app: capsule-brain }
    spec:
      containers:
        - name: api
          image: capsule-brain:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CB_API_HOST
              value: "0.0.0.0"
            - name: CB_API_PORT
              value: "8000"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: capsule-brain-secrets
                  key: admin-token
            - name: APP_ENV
              value: "production"
          ports:
            - containerPort: 8000
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -fsS -H "x-admin-token: ${ADMIN_TOKEN}" http://127.0.0.1:8000/ready
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -fsS -H "x-admin-token: ${ADMIN_TOKEN}" http://127.0.0.1:8000/healthz
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: capsule-brain
spec:
  selector: { app: capsule-brain }
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
