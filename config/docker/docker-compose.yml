services:
  api:
    build: ../..
    env_file: ../../.env
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:-dev-secure-token-123}
      - APP_ENV=${APP_ENV:-production}
    ports:
      - "8000:8000"
    command: ["python", "launch_capsule_brain.py"]
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD-SHELL",
        "curl -fsS -H 'x-admin-token: ${ADMIN_TOKEN:-dev-secure-token-123}' http://localhost:8000/healthz || exit 1",
      ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks: [cbnet]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"
    healthcheck:
      test: [
        "CMD-SHELL",
        "wget -q -O- http://localhost:9090/-/ready >/dev/null || exit 1",
      ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [cbnet]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${GRAFANA_SMTP_HOST}
      - GF_SMTP_USER=${GRAFANA_SMTP_USER}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_FROM}
      - GRAFANA_SLACK_CRITICAL_WEBHOOK=${GRAFANA_SLACK_CRITICAL_WEBHOOK}
      - GRAFANA_SLACK_CRITICAL_CHANNEL=${GRAFANA_SLACK_CRITICAL_CHANNEL}
      - GRAFANA_SLACK_WARNING_WEBHOOK=${GRAFANA_SLACK_WARNING_WEBHOOK}
      - GRAFANA_SLACK_WARNING_CHANNEL=${GRAFANA_SLACK_WARNING_CHANNEL}
      - GRAFANA_WEBHOOK_URL=${GRAFANA_WEBHOOK_URL}
      - GRAFANA_ALERT_EMAILS=${GRAFANA_ALERT_EMAILS}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/your/webhook/url}
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD-SHELL",
        "curl -fsS http://localhost:3000/api/health || exit 1",
      ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [cbnet]

networks:
  cbnet:
    driver: bridge
